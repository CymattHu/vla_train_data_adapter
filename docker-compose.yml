services:
  # ============================================================
  # 仿真数据生成
  # ============================================================
  sim-generate:
    build:
      context: .
      dockerfile: sim/Dockerfile
    volumes:
      - ./data/input:/data/input
    environment:
      - MUJOCO_GL=osmesa
    command: >
      --output /data/input
      --episodes 50
      --success-only

  # 生成少量数据用于快速测试
  sim-generate-quick:
    build:
      context: .
      dockerfile: sim/Dockerfile
    volumes:
      - ./data/input:/data/input
    environment:
      - MUJOCO_GL=osmesa
    command: >
      --output /data/input
      --episodes 5
      --max-steps 100

  # ============================================================
  # 数据转换
  # ============================================================
  vla-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
    environment:
      - PYTHONUNBUFFERED=1

  convert-lerobot:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
    command: >
      convert
      --source mujoco_sim
      --input /data/input
      --format lerobot
      --output /data/output/lerobot

  convert-openpi:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
    command: >
      convert
      --source mujoco_sim
      --input /data/input
      --format openpi
      --output /data/output/openpi

  convert-groot:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
    command: >
      convert
      --source mujoco_sim
      --input /data/input
      --format groot
      --output /data/output/groot

  inspect:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data/input:/data/input
    command: >
      inspect
      --source mujoco_sim
      --input /data/input
      --verbose
